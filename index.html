<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一分钟联盟营销系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Affiliate Recharge Console</p>
        <h1>一分钟联盟营销系统</h1>
        <p class="subtitle">以充值配套为单位，管理推广员、充值订单、佣金计算与结算。</p>
      </div>
      <div class="header-actions">
        <button id="exportBtn" class="button ghost">导出数据</button>
        <button id="resetBtn" class="button danger">重置演示数据</button>
      </div>
    </header>

    <main>
      <section class="metrics" aria-label="核心指标">
        <article>
          <span>今日充值额</span>
          <strong id="metricToday">¥0</strong>
        </article>
        <article>
          <span>本月充值额</span>
          <strong id="metricMonth">¥0</strong>
        </article>
        <article>
          <span>待结算佣金</span>
          <strong id="metricPending">¥0</strong>
        </article>
        <article>
          <span>活跃推广员</span>
          <strong id="metricAffiliates">0</strong>
        </article>
      </section>

      <section class="layout">
        <aside class="panel sidebar">
          <h2>充值配套</h2>
          <form id="packageForm" class="stack">
            <label>
              配套名称
              <input name="name" placeholder="例如：黄金配套" required />
            </label>
            <label>
              充值金额
              <input name="amount" type="number" min="1" step="1" placeholder="888" required />
            </label>
            <label>
              一级佣金比例 %
              <input name="level1" type="number" min="0" max="100" step="0.1" placeholder="20" required />
            </label>
            <label>
              二级佣金比例 %
              <input name="level2" type="number" min="0" max="100" step="0.1" placeholder="5" required />
            </label>
            <button class="button primary" type="submit">新增配套</button>
          </form>
          <div id="packageList" class="list"></div>
        </aside>

        <section class="content">
          <div class="tabs" role="tablist" aria-label="系统模块">
            <button class="tab active" data-tab="orders" role="tab">充值订单</button>
            <button class="tab" data-tab="affiliates" role="tab">推广员</button>
            <button class="tab" data-tab="settlements" role="tab">结算中心</button>
          </div>

          <section id="orders" class="tab-panel active">
            <div class="panel">
              <div class="panel-head">
                <div>
                  <h2>创建充值订单</h2>
                  <p>选择推广员和充值配套后，系统自动生成一级与二级佣金。</p>
                </div>
              </div>
              <form id="orderForm" class="grid-form">
                <label>
                  客户昵称
                  <input name="customer" placeholder="客户名称" required />
                </label>
                <label>
                  推广员
                  <select name="affiliateId" required></select>
                </label>
                <label>
                  充值配套
                  <select name="packageId" required></select>
                </label>
                <label>
                  支付状态
                  <select name="status">
                    <option value="paid">已支付</option>
                    <option value="pending">待支付</option>
                    <option value="refunded">已退款</option>
                  </select>
                </label>
                <button class="button primary" type="submit">生成订单</button>
              </form>
            </div>

            <div class="panel">
              <div class="panel-head">
                <h2>充值订单明细</h2>
                <select id="orderFilter">
                  <option value="all">全部订单</option>
                  <option value="paid">已支付</option>
                  <option value="pending">待支付</option>
                  <option value="refunded">已退款</option>
                </select>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>订单号</th>
                      <th>客户</th>
                      <th>推广员</th>
                      <th>充值配套</th>
                      <th>金额</th>
                      <th>佣金</th>
                      <th>状态</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="orderTable"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section id="affiliates" class="tab-panel">
            <div class="panel">
              <div class="panel-head">
                <div>
                  <h2>推广员档案</h2>
                  <p>支持设置上级推广员，用于二级分佣。</p>
                </div>
              </div>
              <form id="affiliateForm" class="grid-form">
                <label>
                  推广员姓名
                  <input name="name" placeholder="例如：张三" required />
                </label>
                <label>
                  手机号
                  <input name="phone" placeholder="13800000000" required />
                </label>
                <label>
                  上级推广员
                  <select name="parentId"></select>
                </label>
                <button class="button primary" type="submit">新增推广员</button>
              </form>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>推广员</th>
                      <th>手机号</th>
                      <th>上级</th>
                      <th>推广链接</th>
                      <th>累计业绩</th>
                      <th>待结算</th>
                    </tr>
                  </thead>
                  <tbody id="affiliateTable"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section id="settlements" class="tab-panel">
            <div class="panel">
              <div class="panel-head">
                <div>
                  <h2>佣金结算</h2>
                  <p>只结算已支付订单产生的未结算佣金。</p>
                </div>
                <button id="settleAllBtn" class="button primary">一键结算</button>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>推广员</th>
                      <th>来源订单</th>
                      <th>层级</th>
                      <th>佣金</th>
                      <th>状态</th>
                      <th>时间</th>
                    </tr>
                  </thead>
                  <tbody id="commissionTable"></tbody>
                </table>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
